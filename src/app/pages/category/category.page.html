<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Categorías</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" [fullscreen]="true">
  <ion-item>
    <ion-input [(ngModel)]="newCategoryName" placeholder="Nueva categoría"></ion-input>
    <ion-button (click)="addCategory()">Agregar</ion-button>
  </ion-item>

  <ion-list>
    <ion-item *ngFor="let cat of categories$ | async">
      <ion-label>{{ cat.name }}</ion-label>
      <ion-button fill="clear" color="danger" (click)="deleteCategory(cat.id)">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
